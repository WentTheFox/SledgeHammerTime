name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-node-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: 'Building, Linting and Tests'
    runs-on: ubuntu-latest
    env:
      CROWDIN_PROJECT_ID: ${{ vars.CROWDIN_PROJECT_ID }}
      CROWDIN_PROJECT_IDENTIFIER: ${{ vars.CROWDIN_PROJECT_IDENTIFIER }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - run: git config --global --add safe.directory /app

      - name: Set up PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: 8.5
          extensions: bcmath intl pcntl pdo_pgsql

      - name: Cache Composer dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - run: pnpm run lint

      - run: pnpm run test

      - run: pnpm run build

      - name: Prepare .env
        run: |
          cp .env.example .env
          # Configure Laravel to use built-in PostgreSQL
          sed -i 's/DB_CONNECTION=.*/DB_CONNECTION=pgsql/' .env
          sed -i 's/DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/DB_PORT=.*/DB_PORT=5432/' .env
          sed -i 's/DB_DATABASE=.*/DB_DATABASE=laravel_test/' .env
          sed -i 's/DB_USERNAME=.*/DB_USERNAME=laravel_test/' .env
          sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=hunter2/' .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Start built-in PostgreSQL
        run: |
          sudo systemctl start postgresql.service
          sudo systemctl status postgresql.service
          sudo -u postgres psql -c "CREATE DATABASE laravel_test;"
          sudo -u postgres psql -c "CREATE USER laravel_test PASSWORD 'hunter2' SUPERUSER;"

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run PHPStan
        run: ./vendor/bin/phpstan analyse --error-format=github

      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: playwright-

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Run unit and feature tests
        run: php artisan test --filter="Unit|Feature"

      - name: Run browser tests (in Firefox)
        run: php artisan test --filter="Browser" --browser firefox -vvv

      - name: Run browser tests (in Chrome)
        run: php artisan test --filter="Browser" --browser chrome -vvv
