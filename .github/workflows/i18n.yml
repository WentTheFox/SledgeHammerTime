name: Translation credits updater

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-i18n-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-i18n-credits:
    name: 'Update i18n credits'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Re-generate translation credits
        run: pnpm run generate-translation-credits
        env:
          APP_URL: ${{ vars.APP_URL }}
          APP_CONSOLE_USER_TOKEN: ${{ secrets.APP_CONSOLE_USER_TOKEN }}

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7
        with:
          commit_message: Update translation credits
          file_pattern: 'README.md lang/*.json'
